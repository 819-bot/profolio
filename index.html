<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>114-2 高三科技應用專題作品集</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@300;500&display=swap');

        body {
            background-color: #050b1a;
            color: #e0e7ff;
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
        }

        .cyber-header {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(90deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            border-bottom: 2px solid #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        .sidebar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(56, 189, 248, 0.2);
        }

        .menu-item {
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .menu-item:hover, .menu-item.active {
            background: rgba(56, 189, 248, 0.1);
            border-left: 4px solid #38bdf8;
            color: #38bdf8;
        }

        .content-area {
            background: radial-gradient(circle at center, #111827 0%, #050b1a 100%);
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
        }

        iframe {
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 8px;
            height: 500px;
        }

        /* 動畫效果 */
        .slide-in { animation: fadeInUp 0.6s ease-out; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 自定義捲軸 */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #050b1a; }
        ::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="cyber-header h-20 flex items-center justify-center z-50 relative">
        <div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(#38bdf8 1px, transparent 1px); background-size: 20px 20px;"></div>
        <h1 class="text-2xl md:text-3xl font-bold tracking-widest text-blue-400">
            <span class="text-xs block text-blue-200 opacity-70 mb-1">DATA ARCHIVE SYSTEM v2.0</span>
            114-2 高三科技應用專題作品集 - 30921 陳功
        </h1>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <nav class="sidebar w-64 flex-shrink-0 p-6 flex flex-col gap-2">
            <div class="text-xs text-blue-400 font-bold mb-4 tracking-tighter uppercase opacity-50">Navigation Menu</div>
            <button onclick="showContent('game1')" class="menu-item p-4 text-left rounded">🛸 星際獵人 (網頁遊戲)</button>
            <button onclick="showContent('game2')" class="menu-item p-4 text-left rounded">☢️ 末日回收站 (網頁遊戲)</button>
            <button onclick="showContent('3d_a')" class="menu-item p-4 text-left rounded">🐰 3D 作品：兔子</button>
            <button onclick="showContent('reflection')" class="menu-item p-4 text-left rounded mt-4 border-t border-gray-700 pt-6 text-yellow-400">🧠 學習反思與總結</button>
        </nav>

        <main id="main-content" class="content-area flex-1 overflow-y-auto p-8 relative">
            
            <div id="welcome" class="h-full flex flex-col items-center justify-center text-center">
                <div class="animate__animated animate__pulse animate__infinite glass-card p-10 rounded-full mb-8">
                    <svg class="w-20 h-20 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A10.003 10.003 0 0012 3c1.708 0 3.342.43 4.777 1.218M12 3v3m0 12h.01M5.071 19.29a9.001 9.001 0 0112.755-12.754M12 15l3 2m0 0l-3-2m3 2l3-2M9 17l3-2m-3 2l-3-2"></path></svg>
                </div>
                <h2 class="text-4xl font-bold mb-4 animate__animated animate__fadeIn">進入 30921 的科技時空</h2>
                <p class="text-gray-400 max-w-lg leading-relaxed animate__animated animate__fadeIn animate__delay-1s">
                    歡迎來到我的科技應用專題檔案庫。這裡記錄了從 3D 建模到 AI 程式生成的探索旅程。點擊左側選單，啟動數據鏈結。
                </p>
                <div class="mt-8 animate__animated animate__fadeIn animate__delay-2s">
                    <span class="inline-block px-4 py-1 border border-blue-500 text-blue-500 text-xs rounded-full">SYSTEM READY</span>
                </div>
            </div>

            <div id="display-container" class="hidden h-full">
                </div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 bg-black bg-opacity-80 hidden z-[100] flex items-center justify-center p-4">
        <div class="glass-card max-w-md w-full p-8 rounded-lg border-blue-500 animate__animated animate__zoomIn">
            <h3 id="modal-title" class="text-xl font-bold text-blue-400 mb-4">系統提示</h3>
            <p id="modal-text" class="text-gray-200 mb-6 leading-relaxed"></p>
            <button onclick="closeModal()" class="w-full py-2 bg-blue-600 hover:bg-blue-500 text-white rounded transition">確認接收</button>
        </div>
    </div>

    <script>
        const contentData = {
            game1: {
                title: "網頁遊戲：星際獵人",
                url: "https://819-bot.github.io/game/ai_studio_code.html",
                thought: "驚訝於AI變得此便利，甚至能幫忙做出一款遊戲。"
            },
            game2: {
                title: "網頁遊戲：末日回收站",
                url: "https://819-bot.github.io/game/ai_studio_code%20(6).html",
                thought: "有趣而繁雜，尤其是要求修改問題的時候，需要不斷地嘗試與重新生成。"
            },
            '3d_a': {
                title: "3D 作品：兔子",
                url: "https://819-bot.github.io/33/index%203d.html",
                thought: "這個作品是使用 Monster Mash 完成的，看著平面草圖轉換成 3D 動畫動起來的瞬間，很有成就感！"
            },
            reflection: {
                isReflection: true,
                title: "學習反思與總結",
                items: [
                    "使用 Monster Mash 及 Polycam 製作 3D 物件",
                    "使用 Google AI Studio 生成網頁遊戲",
                    "使用 GitHub 上傳網頁",
                    "使用 Gemini 生成學習成果網站首頁"
                ],
                summary: "製作過程真的很繁瑣，雖說看著成果很有成就感，可同樣的很累。但在這數位時代，掌握這些工具讓我看見了創作的無限可能。"
            }
        };

        function showContent(key) {
            document.getElementById('welcome').classList.add('hidden');
            const container = document.getElementById('display-container');
            container.classList.remove('hidden');
            
            const data = contentData[key];
            let html = `<div class="slide-in">`;
            
            if (data.isReflection) {
                html += `
                    <h2 class="text-3xl font-bold mb-6 text-blue-400 border-b border-gray-700 pb-2">${data.title}</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                        ${data.items.map((item, i) => `
                            <div class="glass-card p-4 rounded hover:border-blue-500 cursor-pointer transition" onclick="showTip('課程重點 ${i+1}', '${item}')">
                                <span class="text-blue-400 mr-2 font-mono">0${i+1}.</span> ${item}
                                <div class="text-[10px] text-gray-500 mt-1">CLICK TO EXPAND</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="glass-card p-6 border-l-4 border-yellow-500">
                        <h4 class="text-yellow-500 font-bold mb-2 italic">Reflection</h4>
                        <p class="text-lg leading-relaxed text-gray-300">${data.summary}</p>
                    </div>
                `;
            } else {
                html += `
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-3xl font-bold text-blue-400">${data.title}</h2>
                        <button onclick="showTip('創作心得', '${data.thought}')" class="bg-blue-900 text-blue-200 px-4 py-2 rounded-full text-sm border border-blue-700 hover:bg-blue-800 transition">查看心得</button>
                    </div>
                    <div class="mb-4 text-sm text-gray-500">來源連結：<a href="${data.url}" target="_blank" class="underline hover:text-blue-400">${data.url}</a></div>
                    <iframe src="${data.url}" class="w-full shadow-2xl"></iframe>
                `;
            }
            
            html += `</div>`;
            container.innerHTML = html;

            // 更新選單狀態
            document.querySelectorAll('.menu-item').forEach(el => {
                el.classList.remove('active');
                if(el.innerText.includes(data.title.split('：')[1] || data.title)) el.classList.add('active');
            });
        }

        function showTip(title, text) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }
    </script>
</body>
</html>
